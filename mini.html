<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMISSION REFERENCE</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', sans-serif; background: #fff; padding: 32px 20px 60px; letter-spacing: -0.05em; }
html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

/* ── 툴바 ── */
.toolbar { width: 700px; margin: 0 auto 16px; display: flex; justify-content: center; gap: 8px; }
.capture-all-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 8px;
  background: #aaa; border: none; color: #fff;
  font-size: 12px; font-weight: 600; font-family: 'Pretendard', sans-serif;
  letter-spacing: 0.04em; cursor: pointer; transition: background .18s;
}
.capture-all-btn:hover { background: #111; }
.capture-all-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── 그룹 ── */
.group { width: 700px; margin: 0 auto 30px; }
.wrap-container { background: #fff; border-radius: 12px; padding: 50px; display: flex; flex-direction: column; gap: 30px; }
.wrap-outer { position: relative; }
.group-add-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  width: fit-content; padding: 7px 18px; border-radius: 8px;
  background: none; border: 1.5px dashed #ccc; color: #aaa;
  font-size: 12px; font-weight: 600; font-family: 'Pretendard', sans-serif;
  cursor: pointer; transition: all .18s; margin: 8px auto 0;
}
.group-add-btn:hover { border-color: #888; color: #555; }

/* ── wrap 카드 ── */
.wrap {
  width: 100%; padding: 24px 32px 20px;
  background: #fff; border-radius: 12px; position: relative;
  border: 1px solid #ccc; box-shadow: 0 2px 8px rgba(0,0,0,0.2); overflow: hidden;
}
.wrap.dragging  { opacity: 0.5; }
.wrap.drag-over { outline: 2px dashed #ccc; }

.wrap-handle {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 36px; height: 16px; display: flex; align-items: center;
  justify-content: center; cursor: grab; gap: 3px; padding-top: 6px; z-index: 10;
}
.wrap-handle:active { cursor: grabbing; }
.wrap-handle span { display: block; width: 3px; height: 3px; border-radius: 50%; background: #ccc; }

.wrap-actions { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 4px; z-index: 10; }
.wrap-capture-btn { width: 20px; height: 20px; border-radius: 4px; background: none; border: none; color: #ccc; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.wrap-capture-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.wrap-capture-btn:hover { background: #f0f0f0; color: #888; }
.wrap-del { width: 20px; height: 20px; border-radius: 4px; background: none; border: none; color: #ccc; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.wrap-del:hover { background: #fee; color: #e55; }

/* ── meta-row ── */
.meta-row { display: flex; align-items: center; margin-bottom: 10px; padding-right: 56px; position: relative; z-index: 2; }
.meta-label { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; color: #888; margin-right: 7px; }
.meta-gap { width: 28px; }
.swatches-eye { display: flex; gap: 4px; }
.swatch-long { width: 70px; height: 15px; border-radius: 3px; background: #BFBFBF; border: 1px solid #ccc; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }
.swatch-sm   { width: 22px; height: 15px; border-radius: 3px; background: #BFBFBF; border: 1px solid #ccc; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }

/* ── 그리드 전환 버튼 ── */
.wrap-outer .grid-switcher { position: absolute; top: 0; right: -34px; }
.grid-switcher { display: flex; flex-direction: column; align-items: center; gap: 4px; z-index: 20; }
.grid-btn {
  width: 26px; height: 26px; border-radius: 5px;
  background: #fff; border: 1.5px solid #ddd;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; padding: 4px;
}
.grid-btn:hover { border-color: #888; background: #f5f5f5; }
.grid-btn.active { border-color: #555; background: #555; }
.grid-btn svg { width: 100%; height: 100%; display: block; }
.grid-btn.active svg rect { fill: #fff !important; stroke: #fff !important; }

/* ── 자유 첨부 그리드 ── */
.free-grid { display: grid; gap: 8px; height: 300px; }
.free-grid.mode-1 { grid-template-rows: 1fr;           grid-template-columns: 1fr; }
.free-grid.mode-2 { grid-template-rows: 1fr;           grid-template-columns: 1fr 1fr; }
.free-grid.mode-3 { grid-template-rows: 1fr 1fr;       grid-template-columns: 1fr; }
.free-grid.mode-4 { grid-template-rows: 1fr 1fr 1fr;   grid-template-columns: 1fr; }
.free-grid.mode-5 { grid-template-rows: 1fr 1fr;       grid-template-columns: 1fr 1fr; }
.free-grid.mode-6 { grid-template-rows: 1fr;           grid-template-columns: 1fr; height: auto; min-height: 300px; }
.free-cell { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.free-grid.mode-6 .free-cell     { overflow: visible; }
.free-grid.mode-6 .img-zone-free { height: 300px; overflow: visible; border: none; }
.free-grid.mode-6 .img-zone-free .img-canvas { overflow: visible; }
.free-grid.mode-6 .free-memo     { display: none; }

/* ── 이미지 영역 ── */
.img-row { display: flex; gap: 15px; margin-bottom: 10px; align-items: flex-start; position: relative; z-index: 2; }
.img-col-head { display: flex; flex-direction: column; flex-shrink: 0; position: relative; z-index: 2; }
.img-col-free { display: flex; flex-direction: column; flex: 1; min-width: 0; }

.img-zone-head,
.img-zone-free { position: relative; border-radius: 10px; overflow: hidden; background: #fff; cursor: pointer; }
.img-zone-head { width: 300px; height: 300px; border: 1px solid #E0E0E0; }
.img-zone-free { flex: 1; min-height: 0; overflow: hidden; border: 1px solid #E0E0E0; }
.img-zone-head.has-image,
.img-zone-free.has-image { cursor: crosshair; }
.img-zone-head.dragover,
.img-zone-free.dragover { outline: 2px dashed #aaa; outline-offset: -3px; background: #f8f8f8; }

.img-zone-head input[type=file],
.img-zone-free input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 5; width: 100%; height: 100%; }
.img-zone-head.has-image input[type=file],
.img-zone-free.has-image input[type=file] { display: none; }

.img-canvas { position: absolute; inset: 0; overflow: hidden; z-index: 0; }
.img-canvas img { position: absolute; transform-origin: 0 0; cursor: grab; user-select: none; -webkit-user-drag: none; z-index: 0; }
.img-canvas img.grabbing { cursor: grabbing; }
.img-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #aaa; pointer-events: none; letter-spacing: 0.04em; z-index: 1; }

.img-controls {
  position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,0.45); border-radius: 20px; padding: 4px 8px;
  z-index: 10; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
}
.img-zone-head:hover .img-controls,
.img-zone-free:hover .img-controls { opacity: 1; }
.ctrl-btn   { background: none; border: none; color: #fff; cursor: pointer; font-size: 1rem; line-height: 1; padding: 2px 5px; border-radius: 4px; transition: background 0.15s; font-family: 'Pretendard', sans-serif; }
.ctrl-btn:hover { background: rgba(255,255,255,0.2); }
.ctrl-reset { font-size: 0.68rem; color: rgba(255,255,255,0.8); background: none; border: none; cursor: pointer; padding: 2px 5px; border-radius: 4px; transition: background 0.15s; font-family: 'Pretendard', sans-serif; }
.ctrl-reset:hover { background: rgba(255,255,255,0.2); color: #fff; }
.ctrl-sep   { width: 1px; height: 14px; background: rgba(255,255,255,0.3); margin: 0 2px; }

.reupload-btn {
  position: absolute; top: 6px; right: 6px; z-index: 10;
  background: rgba(0,0,0,0.45); border: none; border-radius: 6px;
  color: #fff; font-size: 0.65rem; padding: 3px 6px;
  cursor: pointer; opacity: 0; transition: opacity 0.2s; font-family: 'Pretendard', sans-serif;
}
.img-zone-head:hover .reupload-btn,
.img-zone-free:hover .reupload-btn { opacity: 1; }

/* ── 메모 ── */
.free-memo { padding: 2px 0 0 2px; flex-shrink: 0; }
.free-memo-text { width: 100%; font-size: 15px; color: #333; font-family: 'Pretendard', sans-serif; outline: none; cursor: text; line-height: 1.6; font-weight: 600; text-align: center; }
.free-memo-text[contenteditable]:empty::before { content: attr(data-placeholder); color: #ccc; }

/* ── 출처 / 체크포인트 ── */
.source-row { padding: 2px 0 0; position: relative; z-index: 2; }
.source-text { width: 100%; font-size: 10px; color: #aaa; font-family: 'Pretendard', sans-serif; outline: none; cursor: text; line-height: 1.6; }
.source-text[contenteditable]:empty::before { content: attr(data-placeholder); color: #ccc; }

.cp-row { display: flex; align-items: flex-start; gap: 10px; position: relative; z-index: 2; margin-top: 18px; }
.cp-icon-box { flex-shrink: 0; margin-top: 2px; }
.cp-icon-box svg { width: 23px; height: 23px; }
.cp-text-area { flex: 1; font-size: 18px; font-weight: 600; color: #333; outline: none; cursor: text; line-height: 1.6; }
.cp-text-area[contenteditable]:empty::before { content: attr(data-placeholder); color: #AAAAAA; }

/* ── 저장/불러오기 드롭다운 ── */
.io-wrap { position: fixed; top: 20px; right: 24px; z-index: 100; }
.io-main-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: #fff; border: 1.5px solid #ddd; color: #555;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .18s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.io-main-btn:hover { border-color: #888; background: #f5f5f5; }
.io-main-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.io-dropdown {
  position: absolute; top: 48px; right: 0;
  display: flex; flex-direction: column; gap: 6px;
  opacity: 0; pointer-events: none; transform: translateY(-6px);
  transition: opacity .18s, transform .18s;
}
.io-wrap.open .io-dropdown { opacity: 1; pointer-events: auto; transform: translateY(0); }
.io-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  background: #fff; border: 1.5px solid #ddd; color: #555;
  font-size: 12px; font-weight: 600; font-family: 'Pretendard', sans-serif;
  cursor: pointer; transition: all .18s; white-space: nowrap;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.io-btn:hover { border-color: #888; color: #111; background: #f5f5f5; }
.io-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

/* ── 컬러 피커 ── */
.cp-overlay { display: none; position: fixed; inset: 0; z-index: 1000; }
.cp-overlay.open { display: block; }
.cp-panel {
  position: fixed; z-index: 1001; background: #fff; border: 1px solid #D8DADF;
  border-radius: 12px; padding: 14px; width: 240px;
  display: flex; flex-direction: column; gap: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
}
.cp-palette { width: 100%; height: 150px; border-radius: 6px; position: relative; cursor: crosshair; flex-shrink: 0; display: block; }
.cp-palette-cursor {
  position: absolute; width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
  transform: translate(-50%,-50%); pointer-events: none;
}
.cp-slider-wrap { position: relative; height: 12px; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
.cp-slider-thumb {
  position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
  transform: translate(-50%,-50%); pointer-events: none;
}
.cp-hex-row { display: flex; align-items: center; gap: 8px; }
.cp-hex-label { font-size: 12px; color: #9AA0B0; min-width: 28px; }
.cp-hex-input {
  flex: 1; min-width: 0; font-size: 13px; font-family: monospace;
  border: 1px solid #E8EAEF; border-radius: 8px;
  padding: 6px 8px; background: #F7F8FA; color: #1A1A2E; outline: none;
}
.cp-hex-input:focus { border-color: #9AA0B0; }
.eyedropper-btn {
  width: 28px; height: 28px; border-radius: 5px; border: 1px solid #E8EAEF; background: #F7F8FA;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; padding: 0; transition: background 0.15s, border-color 0.15s;
}
.eyedropper-btn:hover:not(:disabled) { background: #ECEEF2; border-color: #C8CAD0; }
.eyedropper-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.eyedropper-btn svg { width: 14px; height: 14px; stroke: #5A6070; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.tooltip-wrap { position: relative; display: inline-flex; }
.cp-tooltip {
  position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%);
  background: #2A2D35; color: #fff; font-size: 11.5px; line-height: 1.5;
  padding: 6px 10px; border-radius: 7px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 1100;
}
.cp-tooltip::after {
  content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
  border: 5px solid transparent; border-top-color: #2A2D35;
}
.tooltip-wrap:hover .cp-tooltip { opacity: 1; }
.cp-apply-btn {
  width: 100%; padding: 7px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: filter 0.15s;
}
.cp-apply-btn:hover { filter: brightness(1.1); }

/* ── 캡처 중 숨김 ── */
.capturing .wrap-handle,
.capturing .wrap-actions,
.wrap-outer.capturing-outer .grid-switcher { display: none !important; }
</style>
</head>
<body>

<div class="cp-overlay" id="cp-overlay" onclick="closePicker(event)"></div>
<div class="cp-panel" id="cp-panel" style="display:none;">
  <canvas class="cp-palette" id="cp-palette" width="212" height="150"></canvas>
  <div class="cp-slider-wrap" id="cp-hue-track">
    <canvas id="cp-hue-canvas" width="212" height="12" style="width:100%;height:12px;border-radius:6px;display:block;"></canvas>
    <div class="cp-slider-thumb" id="cp-hue-thumb"></div>
  </div>
  <div class="cp-slider-wrap" id="cp-val-track">
    <div class="cp-slider-thumb" id="cp-val-thumb"></div>
  </div>
  <div class="cp-hex-row">
    <span class="cp-hex-label">Hex</span>
    <input class="cp-hex-input" id="cp-hex-input" maxlength="7" spellcheck="false" oninput="cpOnHexType(this.value)">
    <div class="tooltip-wrap">
      <button class="eyedropper-btn" id="cp-eyedropper-btn" onclick="cpEyedropper()">
        <svg viewBox="0 0 24 24"><path d="M20.71 5.63l-2.34-2.34a1 1 0 0 0-1.41 0l-3.12 3.12-1.41-1.42-1.42 1.42 1.41 1.41-6.6 6.6A2 2 0 0 0 5 16v3h3a2 2 0 0 0 1.42-.59l6.6-6.6 1.41 1.42 1.42-1.42-1.42-1.41 3.12-3.12a1 1 0 0 0 0-1.65z"/></svg>
      </button>
      <div class="cp-tooltip" id="cp-eyedropper-tooltip">화면에서 색상 추출</div>
    </div>
  </div>
  <button class="cp-apply-btn" id="cp-apply-btn" onclick="cpApply()">적용</button>
</div>

<div class="io-wrap" id="io-wrap">
  <button class="io-main-btn" onclick="toggleIO()" title="저장 / 불러오기">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/><circle cx="5" cy="12" r="1.5" fill="currentColor"/></svg>
  </button>
  <div class="io-dropdown">
    <button class="io-btn" onclick="saveJSON(); toggleIO()">
      <svg viewBox="0 0 24 24"><path d="M12 15V3m0 12-4-4m4 4 4-4M2 17v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2"/></svg>
      JSON 저장
    </button>
    <button class="io-btn" onclick="loadJSON(); toggleIO()">
      <svg viewBox="0 0 24 24"><path d="M12 9v12m0-12 4 4m-4-4-4 4M2 7V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v2"/></svg>
      JSON 불러오기
    </button>
    <div style="height:1px;background:#eee;margin:2px 0;"></div>
    <button class="io-btn" onclick="window.location.href='center.html'">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      Center로 전환
    </button>
    <button class="io-btn" onclick="window.location.href='side.html'">
      <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
      Side로 전환
    </button>
  </div>
</div>

<div class="toolbar">
  <button class="capture-all-btn" onclick="captureAll(1)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
    전체 캡처
  </button>
  <button class="capture-all-btn" onclick="captureAll(2)">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="4"/></svg>
    2배 캡처
  </button>
</div>

<div id="container"></div>

<script>
'use strict';

let wrapCount = 0;
const imgStates = {};

/* 그룹 / wrap 생성 */

function createGroup() {
  const g = document.createElement('div');
  g.className = 'group';
  g.innerHTML = `
    <div class="wrap-container"></div>
    <button class="group-add-btn" onclick="addWrapToGroup(this)">＋ 추가</button>
  `;
  return g;
}

function makeFreeCell(id, slot) {
  return `
    <div class="free-cell">
      <div class="img-zone-free" id="z${id}${slot}">
        <input type="file" accept="image/*" onchange="initImg(this,'z${id}${slot}','i${id}${slot}')">
        <div class="img-canvas" id="i${id}${slot}-canvas"></div>
        <div class="img-label" id="i${id}${slot}-lbl">자유 첨부</div>
        <button class="reupload-btn" onclick="reup('z${id}${slot}','i${id}${slot}')">교체</button>
        <div class="img-controls">
          <button class="ctrl-btn" onclick="zm('i${id}${slot}',-0.1)">－</button>
          <button class="ctrl-btn" onclick="zm('i${id}${slot}',0.1)">＋</button>
          <div class="ctrl-sep"></div>
          <button class="ctrl-reset" onclick="rs('i${id}${slot}')">초기화</button>
        </div>
      </div>
      <div class="free-memo">
        <div class="free-memo-text" contenteditable="true" spellcheck="false" data-placeholder="메모"></div>
      </div>
    </div>`;
}

function createSwitcher(id) {
  const el = document.createElement('div');
  el.className = 'grid-switcher';
  el.innerHTML = `
    <button class="grid-btn" title="1칸"     onclick="setGridMode(this,'mode-1',${id})">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="14" rx="2" fill="#bbb"/></svg>
    </button>
    <button class="grid-btn" title="2열"     onclick="setGridMode(this,'mode-2',${id})">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="14" rx="1.5" fill="#bbb"/><rect x="9" y="1" width="6" height="14" rx="1.5" fill="#bbb"/></svg>
    </button>
    <button class="grid-btn" title="2횡"     onclick="setGridMode(this,'mode-3',${id})">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="6" rx="1.5" fill="#bbb"/><rect x="1" y="9" width="14" height="6" rx="1.5" fill="#bbb"/></svg>
    </button>
    <button class="grid-btn active" title="3횡" onclick="setGridMode(this,'mode-4',${id})">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="14" height="3.5" rx="1" fill="#bbb"/><rect x="1" y="6.25" width="14" height="3.5" rx="1" fill="#bbb"/><rect x="1" y="11.5" width="14" height="3.5" rx="1" fill="#bbb"/></svg>
    </button>
    <button class="grid-btn" title="2×2"    onclick="setGridMode(this,'mode-5',${id})">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="#bbb"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="#bbb"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="#bbb"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="#bbb"/></svg>

/* 캡처 */
function hideEmptyCells() {
  const hidden = [];
  document.querySelectorAll('.free-cell').forEach(cell => {
    if (cell.style.display === 'none') return;
    if (!cell.querySelector('.img-zone-free')?.classList.contains('has-image')) {
      cell.style.display = 'none';
      hidden.push(cell);
    }
  });
  document.querySelectorAll('.source-row').forEach(row => {
    if (row.querySelector('.source-text')?.innerText.trim() === '') {
      row.style.display = 'none';
      hidden.push(row);
    }
  });
  return hidden;
}

function restoreCells(hidden) {
  hidden.forEach(el => el.style.display = '');
}

function fixFreeCellHeights(wrap) {
  const restored = [];
  wrap.querySelectorAll('.free-grid').forEach(grid => {
    restored.push({ el: grid, prop: 'height', val: grid.style.height });
    grid.style.height = grid.offsetHeight + 'px';
    grid.querySelectorAll('.free-cell').forEach(cell => {
      if (cell.style.display === 'none') return;
      const zone = cell.querySelector('.img-zone-free');
      restored.push({ el: cell, prop: 'height',    val: cell.style.height });
      restored.push({ el: cell, prop: 'minHeight', val: cell.style.minHeight });
      cell.style.height    = cell.offsetHeight + 'px';
      cell.style.minHeight = cell.offsetHeight + 'px';
      if (zone) {
        restored.push({ el: zone, prop: 'height', val: zone.style.height });
        restored.push({ el: zone, prop: 'flex',   val: zone.style.flex });
        zone.style.height = zone.offsetHeight + 'px';
        zone.style.flex   = 'none';
      }
    });
  });
  return restored;
}

function restoreFreeCellHeights(restored) {
  restored.forEach(({ el, prop, val }) => { el.style[prop] = val; });
}

function resizeCanvas(src, ratio) {
  const dst = document.createElement('canvas');
  dst.width  = Math.round(src.width  * ratio);
  dst.height = Math.round(src.height * ratio);
  dst.getContext('2d').drawImage(src, 0, 0, dst.width, dst.height);
  return dst;
}

function download(canvas, filename) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

async function captureWrap(btn) {
  const wrap  = btn.closest('.wrap');
  const outer = wrap.closest('.wrap-outer');
  wrap.classList.add('capturing');
  if (outer) outer.classList.add('capturing-outer');
  const hidden   = hideEmptyCells();
  const restored = fixFreeCellHeights(wrap);
  const pad = 30;
  const canvas = await html2canvas(wrap, {
    scale: 2, useCORS: true, backgroundColor: '#FFFFFF',
    x: -pad, y: -pad,
    width:  wrap.offsetWidth  + pad * 2,
    height: wrap.offsetHeight + pad * 2
  });
  restoreFreeCellHeights(restored);
  restoreCells(hidden);
  wrap.classList.remove('capturing');
  if (outer) outer.classList.remove('capturing-outer');
  download(resizeCanvas(canvas, 0.5), `간단-.png`);
}

async function captureAll(mode = 1) {
  document.querySelectorAll('.wrap').forEach(w => w.classList.add('capturing'));
  document.querySelectorAll('.wrap-outer').forEach(o => o.classList.add('capturing-outer'));
  const hidden = hideEmptyCells();
  const allRestored = [];
  document.querySelectorAll('.wrap').forEach(w => allRestored.push(...fixFreeCellHeights(w)));
  const containers = document.querySelectorAll('.wrap-container');
  for (let i = 0; i < containers.length; i++) {
    const canvas = await html2canvas(containers[i], { scale: 2, useCORS: true, backgroundColor: '#FFFFFF' });
    const out    = mode === 2 ? canvas : resizeCanvas(canvas, 0.5);
    const suffix = containers.length === 1 ? '' : `-group-${i + 1}`;
    download(out, `간단-.png`);
  }
  restoreFreeCellHeights(allRestored);
  restoreCells(hidden);
  document.querySelectorAll('.wrap').forEach(w => w.classList.remove('capturing'));
  document.querySelectorAll('.wrap-outer').forEach(o => o.classList.remove('capturing-outer'));
}

/*  컬러 피커 */

const cp = { h:0, s:0, v:1, side: null, dragging: null };

function hsvToRgb(h, s, v) {
  const i = Math.floor(h/60)%6, f = h/60 - Math.floor(h/60);
  const p = v*(1-s), q = v*(1-f*s), t = v*(1-(1-f)*s);
  return [[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i].map(x => Math.round(x*255));
}
function rgbToHex(r, g, b) { return '#' + [r,g,b].map(x => x.toString(16).padStart(2,'0')).join(''); }
function hexToHsv(hex) {
  hex = hex.replace('#','');
  if (hex.length !== 6) return null;
  const r = parseInt(hex.slice(0,2),16)/255, g = parseInt(hex.slice(2,4),16)/255, b = parseInt(hex.slice(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b), d = max-min;
  let h = 0, s = max===0 ? 0 : d/max, vv = max;
  if (d) { if (max===r) h=((g-b)/d+6)%6; else if (max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; }
  return { h, s, v: vv };
}
function getContrastColor(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b)/255 > 0.55 ? '#000000' : '#ffffff';
}
function cpGetHex() { return rgbToHex(...hsvToRgb(cp.h, cp.s, cp.v)); }

function cpDrawPalette() {
  const canvas = document.getElementById('cp-palette'), ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const [hr,hg,hb] = hsvToRgb(cp.h, 1, 1);
  const gradH = ctx.createLinearGradient(0,0,W,0);
  gradH.addColorStop(0,'#fff'); gradH.addColorStop(1,`rgb(${hr},${hg},${hb})`);
  ctx.fillStyle = gradH; ctx.fillRect(0,0,W,H);
  const gradV = ctx.createLinearGradient(0,0,0,H);
  gradV.addColorStop(0,'rgba(0,0,0,0)'); gradV.addColorStop(1,'#000');
  ctx.fillStyle = gradV; ctx.fillRect(0,0,W,H);
}
function cpDrawHue() {
  const canvas = document.getElementById('cp-hue-canvas'), ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,canvas.width,0);
  for (let i = 0; i <= 360; i += 30) grad.addColorStop(i/360, `hsl(${i},100%,50%)`);
  ctx.fillStyle = grad; ctx.fillRect(0,0,canvas.width,canvas.height);
}
function cpSyncUI() {
  const hex = cpGetHex(), contrast = getContrastColor(hex);
  const [hr,hg,hb] = hsvToRgb(cp.h, cp.s, 1);
  const pal = document.getElementById('cp-palette'), cur = pal.querySelector('.cp-palette-cursor');
  cur.style.left = (cp.s * pal.offsetWidth)  + 'px';
  cur.style.top  = ((1-cp.v) * pal.offsetHeight) + 'px';
  const hueTrack = document.getElementById('cp-hue-track');
  document.getElementById('cp-hue-thumb').style.left = (cp.h/360 * hueTrack.offsetWidth) + 'px';
  const valTrack = document.getElementById('cp-val-track');
  valTrack.style.background = `linear-gradient(to right, #000, rgb(${hr},${hg},${hb}))`;
  document.getElementById('cp-val-thumb').style.left = (cp.v * valTrack.offsetWidth) + 'px';
  document.getElementById('cp-hex-input').value = hex;
  const applyBtn = document.getElementById('cp-apply-btn');
  applyBtn.style.background = hex; applyBtn.style.color = contrast;
}

function openPicker(side, el) {
  cp.side = side;
  const swatch = document.getElementById('swatch-' + side);
  const tmp = document.createElement('div');
  tmp.style.color = swatch?.style.background || '#BFBFBF';
  document.body.appendChild(tmp);
  const rgb = getComputedStyle(tmp).color;
  document.body.removeChild(tmp);
  const m = rgb.match(/\d+/g);
  const hsv = m ? hexToHsv(rgbToHex(+m[0],+m[1],+m[2])) : null;
  if (hsv) { cp.h = hsv.h; cp.s = hsv.s; cp.v = hsv.v; }

  const panel = document.getElementById('cp-panel'), overlay = document.getElementById('cp-overlay');
  panel.style.display = 'flex'; overlay.classList.add('open');

  const rect = el.getBoundingClientRect(), pW = 240, pH = 340;
  let left = rect.left, top = rect.bottom + 8;
  if (left + pW > window.innerWidth  - 12) left = window.innerWidth  - pW - 12;
  if (top  + pH > window.innerHeight - 12) top  = rect.top - pH - 8;
  panel.style.left = left + 'px'; panel.style.top = top + 'px';

  cpDrawHue();
  if (!document.getElementById('cp-palette').querySelector('.cp-palette-cursor')) {
    const cur = document.createElement('div');
    cur.className = 'cp-palette-cursor';
    document.getElementById('cp-palette').appendChild(cur);
  }
  cpDrawPalette(); cpSyncUI();
}

function closePicker(e) {

  document.getElementById('cp-panel').style.display = 'none';

function cpApply() {
  const hex = cpGetHex(), side = cp.side;

  if (!swatch) return;
  swatch.style.background = hex;
  const inp = swatch.querySelector('input'); if (inp) inp.value = hex;

}

function cpOnHexType(val) {

    if (hsv) { cp.h = hsv.h; cp.s = hsv.s; cp.v = hsv.v; cpDrawPalette(); cpSyncUI(); }

}

async function cpEyedropper() {

document.addEventListener('DOMContentLoaded', () => {
  const pal      = document.getElementById('cp-palette');
  const hueTrack = document.getElementById('cp-hue-track');
  const valTrack = document.getElementById('cp-val-track');
  const palPick = e => {
    const r = pal.getBoundingClientRect();
    cp.s = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
    cp.v = 1 - Math.max(0, Math.min(1, (e.clientY-r.top)/r.height));
    cpSyncUI();
  };
  const huePick = e => {
    const r = hueTrack.getBoundingClientRect();
    cp.h = Math.max(0, Math.min(360, ((e.clientX-r.left)/r.width)*360));
    cpDrawPalette(); cpSyncUI();
  };
  const valPick = e => {
    const r = valTrack.getBoundingClientRect();
    cp.v = Math.max(0, Math.min(1, (e.clientX-r.left)/r.width));
    cpSyncUI();
  };
  pal.addEventListener('mousedown',      e => { cp.dragging='palette'; palPick(e); e.preventDefault(); });
  hueTrack.addEventListener('mousedown', e => { cp.dragging='hue';     huePick(e); e.preventDefault(); });
  valTrack.addEventListener('mousedown', e => { cp.dragging='val';     valPick(e); e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if      (cp.dragging==='palette') palPick(e);
    else if (cp.dragging==='hue')     huePick(e);
    else if (cp.dragging==='val')     valPick(e);
  });
  document.addEventListener('mouseup', () => { cp.dragging = null; });
});

/* 색상 처리 */
function luminance(hex) {
  return 0.299 * parseInt(hex.slice(1,3),16)
       + 0.587 * parseInt(hex.slice(3,5),16)
       + 0.114 * parseInt(hex.slice(5,7),16);
}

function onHairChange(color, id) {
  const isLight = luminance(color) >= 210;
  const circle = document.getElementById('icon-circle-' + id);
  const check  = document.getElementById('icon-check-'  + id);
  const swatch = document.getElementById('swatch-hair-' + id);
  circle.setAttribute('fill',         color);
  circle.setAttribute('stroke',       isLight ? '#ccc'  : 'none');
  circle.setAttribute('stroke-width', isLight ? '1'     : '0');
  check.setAttribute('stroke',        isLight ? '#888'  : 'white');
  if (swatch) swatch.style.border = isLight ? '1px solid #ccc' : '1px solid transparent';
}

function onSwatchChange(color, el) {
  el.style.border = luminance(color) >= 210 ? '1px solid #ccc' : '1px solid transparent';
}

/* 이미지 업로드 / 조작 */

function initImg(input, wId, iId) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const w   = document.getElementById(wId);
    const cv  = document.getElementById(iId + '-canvas');
    const lbl = document.getElementById(iId + '-lbl');
    const old = cv.querySelector('img');
    if (old) old.remove();
    const img = document.createElement('img');
    img.id = iId + '-img'; img.src = e.target.result; img.draggable = false;
    cv.appendChild(img);
    img.onload = () => {
      const isOverview = w.closest('.free-cell')?.closest('.free-grid')?.classList.contains('mode-6');
      const wW = w.offsetWidth, wH = w.offsetHeight;
      const nW = img.naturalWidth, nH = img.naturalHeight;
      const sc = isOverview ? wW/nW : Math.max(wW/nW, wH/nH);
      const x  = isOverview ? 0 : (wW - nW*sc) / 2;
      const y  = isOverview ? 0 : (wH - nH*sc) / 2;
      imgStates[iId] = { sc, x, y, nW, nH, wW, wH };
      applyT(iId);
      w.classList.add('has-image');
      if (lbl) lbl.style.display = 'none';
      drag(img, iId, w);
      wheel(w, iId);
    };
  };
  reader.readAsDataURL(input.files[0]);
}

function applyT(id) {
  const img = document.getElementById(id + '-img');
  if (!img) return;
  const s = imgStates[id];
  img.style.width     = s.nW + 'px';
  img.style.height    = s.nH + 'px';
  img.style.transform = `translate(${s.x}px,${s.y}px) scale(${s.sc})`;
}

function zm(id, d) {
  const s = imgStates[id]; if (!s) return;
  const ns = Math.max(0.1, Math.min(10, s.sc + d*s.sc));
  const r  = ns/s.sc, cx = s.wW/2, cy = s.wH/2;
  s.x = cx - r*(cx - s.x); s.y = cy - r*(cy - s.y); s.sc = ns;
  applyT(id);
}

function rs(id) {
  const s = imgStates[id]; if (!s) return;
  s.sc = Math.max(s.wW/s.nW, s.wH/s.nH);
  s.x  = (s.wW - s.nW*s.sc) / 2;
  s.y  = (s.wH - s.nH*s.sc) / 2;
  applyT(id);
}

function drag(img, id, w) {
  let on = false, sx, sy, ox, oy;
  w.addEventListener('mousedown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    if (!imgStates[id]) return;
    on = true; sx = e.clientX; sy = e.clientY;
    ox = imgStates[id].x; oy = imgStates[id].y;
    img.classList.add('grabbing'); e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!on) return;
    const s = imgStates[id]; if (!s) return;
    s.x = ox + (e.clientX - sx); s.y = oy + (e.clientY - sy);
    applyT(id);
  });
  document.addEventListener('mouseup', () => { if (on) { on = false; img.classList.remove('grabbing'); } });
}

function wheel(w, id) {
  w.addEventListener('wheel', e => {
    if (!imgStates[id]) return;
    e.preventDefault();
    const rc = w.getBoundingClientRect();
    const cx = e.clientX - rc.left, cy = e.clientY - rc.top;
    const d  = e.deltaY > 0 ? -0.08 : 0.08;
    const s  = imgStates[id];
    const ns = Math.max(0.1, Math.min(10, s.sc + d*s.sc));
    const r  = ns/s.sc;
    s.x = cx - r*(cx - s.x); s.y = cy - r*(cy - s.y); s.sc = ns;
    applyT(id);
  }, { passive: false });
}

function reup(wId, iId) {
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = 'image/*'; fi.style.display = 'none';
  document.body.appendChild(fi);
  fi.onchange = () => { initImg(fi, wId, iId); document.body.removeChild(fi); };
  fi.click();
}

function addDropZone(zone, wId, iId) {
  zone.addEventListener('dragenter', e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', e => { if (!zone.contains(e.relatedTarget)) zone.classList.remove('dragover'); });
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    initImg({ files: [file] }, wId, iId);
  });
}

/*  상태 수집 / 복원 */

function collectState(includeImages = false) {
  const wraps = [];
  document.querySelectorAll('.wrap').forEach(w => {
    const id = w.dataset.wid;
    const activeMode = [...w.querySelector('.free-grid').classList].find(c => c.startsWith('mode-')) || 'mode-4';
    const cells = [];
    w.querySelectorAll('.free-cell').forEach((cell, i) => {
      const iId = `i${id}${'bcde'[i]}`;
      const img = document.getElementById(iId + '-img');
      cells.push({
        memo:   cell.querySelector('.free-memo-text')?.innerText.trim() || '',
        imgSrc: includeImages && img ? img.src : null,
        state:  imgStates[iId] || null
      });
    });
    const headImg = document.getElementById(`i${id}a-img`);
    wraps.push({
      id, activeMode,
      hair:  w.querySelector(`#swatch-hair-${id} input`)?.value  || '#BFBFBF',
      eye1:  w.querySelector(`#swatch-eye1-${id} input`)?.value  || '#BFBFBF',
      eye2:  w.querySelector(`#swatch-eye2-${id} input`)?.value  || '#A0A0A0',
      source: w.querySelector('.source-text')?.innerText.trim() || '',
      cp:     w.querySelector('.cp-text-area')?.innerText.trim() || '',
      cells,
      headSrc:   includeImages && headImg ? headImg.src : null,
      headState: imgStates[`i${id}a`] || null
    });
  });
  return { wraps };
}

async function applyState(state) {
  const container = document.querySelector('.wrap-container');
  const existing  = container.querySelectorAll('.wrap').length;
  for (let i = existing; i < state.wraps.length; i++) {
    addWrapToGroup(document.querySelector('.group-add-btn'));
  }
  await new Promise(r => setTimeout(r, 50));
  const wraps = document.querySelectorAll('.wrap');
  state.wraps.forEach((data, idx) => {
    const w = wraps[idx]; if (!w) return;
    const id = w.dataset.wid;

    const activeBtn = [...w.querySelectorAll('.grid-btn')].find(b => b.getAttribute('onclick')?.includes(data.activeMode));
    if (activeBtn) setGridMode(activeBtn, data.activeMode, id);

    const setColor = (swatchId, color, fn) => {
      const swatch = document.getElementById(swatchId); if (!swatch) return;
      swatch.style.background = color;
      const inp = swatch.querySelector('input'); if (inp) inp.value = color;
      if (fn) fn(color, id);
    };
    setColor(`swatch-hair-${id}`, data.hair, onHairChange);
    setColor(`swatch-eye1-${id}`, data.eye1, (c) => onSwatchChange(c, document.getElementById(`swatch-eye1-${id}`)));
    setColor(`swatch-eye2-${id}`, data.eye2, (c) => onSwatchChange(c, document.getElementById(`swatch-eye2-${id}`)));

    const sourceEl = w.querySelector('.source-text'); if (sourceEl) sourceEl.innerText = data.source;
    const cpEl     = w.querySelector('.cp-text-area'); if (cpEl)     cpEl.innerText     = data.cp;

    if (data.headSrc) restoreImg(`z${id}a`, `i${id}a`, data.headSrc, data.headState);
    data.cells.forEach((cell, i) => {
      const slot = 'bcde'[i], iId = `i${id}${slot}`;
      const memo = w.querySelectorAll('.free-memo-text')[i]; if (memo) memo.innerText = cell.memo;
      if (cell.imgSrc) restoreImg(`z${id}${slot}`, iId, cell.imgSrc, cell.state);
    });
  });
}

function restoreImg(wId, iId, src, state) {
  const w = document.getElementById(wId), cv = document.getElementById(iId + '-canvas');
  const lbl = document.getElementById(iId + '-lbl');
  if (!w || !cv) return;
  const old = cv.querySelector('img'); if (old) old.remove();
  const img = document.createElement('img');
  img.id = iId + '-img'; img.src = src; img.draggable = false;
  cv.appendChild(img);
  img.onload = () => {
    if (state) {
      imgStates[iId] = { ...state }; applyT(iId);
    } else {
      const isOverview = w.closest('.free-cell')?.closest('.free-grid')?.classList.contains('mode-6');
      const wW = w.offsetWidth, wH = w.offsetHeight;
      const nW = img.naturalWidth, nH = img.naturalHeight;
      const sc = isOverview ? wW/nW : Math.max(wW/nW, wH/nH);
      const x  = isOverview ? 0 : (wW - nW*sc) / 2;
      const y  = isOverview ? 0 : (wH - nH*sc) / 2;
      imgStates[iId] = { sc, x, y, nW, nH, wW, wH }; applyT(iId);
    }
    w.classList.add('has-image');
    if (lbl) lbl.style.display = 'none';
    drag(img, iId, w); wheel(w, iId);
  };
}

/* 저장 / 불러오기 */
function toggleIO() { document.getElementById('io-wrap').classList.toggle('open'); }
document.addEventListener('click', e => {
  const wrap = document.getElementById('io-wrap');
  if (wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
});

const LS_KEY = 'reference-mini-state';

function lsSave() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(collectState(false))); }
  catch(e) { console.warn('lsSave 실패:', e); }
}
async function lsLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) await applyState(JSON.parse(raw));
  } catch(e) { console.warn('lsLoad 실패:', e); }
}

let lsTimer = null;
function lsDebouncedSave() { clearTimeout(lsTimer); lsTimer = setTimeout(lsSave, 1000); }
document.addEventListener('input',  lsDebouncedSave);
document.addEventListener('change', lsDebouncedSave);

function saveJSON() {
  const blob = new Blob([JSON.stringify(collectState(true), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = '간단저장용-.json'; a.click();
  URL.revokeObjectURL(a.href);
}

function loadJSON() {
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.json'; fi.style.display = 'none';
  document.body.appendChild(fi);
  fi.onchange = async () => {
    try {
      await applyState(JSON.parse(await fi.files[0].text()));
      lsSave();
    } catch(e) { alert('JSON 파일을 불러오는 데 실패했어요.'); }
    document.body.removeChild(fi);
  };
  fi.click();
}

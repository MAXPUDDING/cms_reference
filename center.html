<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMISSION REFERENCE</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* HAIR / EYE 스와치 */
  .meta-row { display: flex; align-items: center; margin-top: 0.8em; margin-bottom: 6px; position: relative; z-index: 2; }
  .meta-label { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; color: #888; margin-right: 7px; }
  .meta-gap { width: 28px; }
  .swatches-eye { display: flex; gap: 4px; }
  .swatch-long { width: 70px; height: 15px; border-radius: 3px; background: #BFBFBF; border: 1px solid #ccc; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }
  .swatch-sm   { width: 22px; height: 15px; border-radius: 3px; background: #BFBFBF; border: 1px solid #ccc; cursor: pointer; position: relative; overflow: hidden; flex-shrink: 0; }

  /* 출처 표기 */
  .source-row { margin-top: 5px; margin-bottom: 0; }
  .source-text {
    width: 100%; font-size: 12px; color: #aaa; outline: none; cursor: text; line-height: 1.6;
  }
  .source-text[contenteditable]:empty::before { content: attr(data-placeholder); color: #ccc; }

/* 우측 상단 버튼 */
  .io-wrap { position: fixed; top: 20px; right: 24px; z-index: 2000; }
  .io-main-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: #fff; border: 1.5px solid #ddd; color: #555;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .18s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .io-main-btn:hover { border-color: #888; background: #f5f5f5; }
  .io-main-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .io-dropdown {
    position: absolute; top: 48px; right: 0;
    display: flex; flex-direction: column; gap: 6px;
    opacity: 0; pointer-events: none; transform: translateY(-6px);
    transition: opacity .18s, transform .18s;
  }
  .io-wrap.open .io-dropdown { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .io-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    background: #fff; border: 1.5px solid #ddd; color: #555;
    font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all .18s; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .io-btn:hover { border-color: #888; color: #111; background: #f5f5f5; }
  .io-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* 캡처 중 숨김 */
  .capturing .add-trait-btn,
  html.capturing .add-trait-btn { display: none !important; }
  .capturing .source-text:empty,
  html.capturing .source-text:empty { display: none !important; }
  .capturing .fullbody-tabs,
  html.capturing .fullbody-tabs { display: none !important; }
  html.capturing .io-wrap { display: none !important; }

  :root {
    --A-color: #888888;
    --A-color-accent: #6b6b6b;
    --A-color-light: #c8c8c8;
    --A-color-pale: #f0f0f0;
    --B-color: #dddddd;
    --B-color-accent: #bbbbbb;
    --B-color-light: #eeeeee;
    --B-color-pale: #f7f7f7;
    --text-dark: #1A1A2E;
    --text-mid: #5A6070;
    --text-light: #9AA0B0;
    --border: #E8EAEF;
  }

  html, body { font-family: 'Pretendard', sans-serif; background: #fff; min-height: 100vh; overflow-x: hidden; scrollbar-width: none; }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }
  .pair-name, .au-name { letter-spacing: 0; }

  .page-wrap {
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    align-items: start;
    column-gap: 0;
    width: 1200px;
    margin: 0 auto;
  }

  /* 타이틀 */
  .title-row {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 300px 1fr 300px;
    align-items: center;
    padding: 3rem 0 1.4rem;
    width: 1200px;
    margin: 0 auto;
    position: relative; z-index: 3;
  }
  .title-side-a { display: flex; align-items: center; justify-content: flex-start; padding-left: 1.2rem; }
  .title-side-b { display: flex; align-items: center; justify-content: flex-end; padding-right: 1.2rem; }
  .title-center { grid-column: 2; text-align: center; }

  .side-label {
    font-size: 1rem; font-weight: 700; color: #fff;
    width: 2rem; height: 2rem; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .side-label.A-color { background: var(--A-color); }
  .side-label.B-color { background: var(--B-color); }

  .pair-name {
    font-size: 24px; font-weight: 900; 
    background-image: linear-gradient(to right, var(--A-color), var(--B-color));
     background-clip: text;
     -webkit-background-clip: text;
     color: transparent;
    letter-spacing: 14px; outline: none;
    padding: 0 0 0 14px;
    border-bottom: 2px solid transparent; transition: border-color 0.2s;
    display: inline-block; min-width: 60px; cursor: text;
  }
  .pair-name:hover, .pair-name:focus { border-bottom-color: var(--A-color-accent); }

  .au-name {
    font-size: 14px; font-weight: 700; color: var(--text-light); margin-top: 0.3rem;
    letter-spacing: 5px;
    padding: 0 0 0 5px;
    outline: none; border-bottom: 1px solid transparent; transition: border-color 0.2s;
    display: inline-block; min-width: 40px; cursor: text;
  }
  .au-name:hover, .au-name:focus { border-bottom-color: var(--A-color-accent); }

  /* 사이드 패널 */
  .side-panel.shared-fullbody { padding: 0 1.5rem 2rem; position: relative; }

  /* 전신 이미지 탭 */
  .fullbody-tabs {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 4;
  }
  .fullbody-tab {
    padding: 4px 12px; border-radius: 6px; border: 1px solid #E0E0E0;
    background: rgba(255,255,255,0.85); font-size: 0.75rem; cursor: pointer;
    color: #BBBBBB; transition: all 0.15s;
  }
  .fullbody-tab.active {
    background: rgba(255,255,255,0.85); color: #888888; border-color: #CCCCCC;
  }
  .fullbody-tab:hover:not(.active) { background: rgba(245,245,245,0.9); color: #999999; }

  .fullbody-wrap.mode-fixed {
    overflow: hidden !important;
    border-radius: 10px;
    border: 1.5px solid var(--border);
  }
  /* 전신 이미지 좌우 그라디언트 */
  .grad-overlay {
    position: fixed; top: 0; bottom: 0;
    z-index: 2; pointer-events: none;
  }
  .grad-overlay.left {
    left: 0;
    background: linear-gradient(to right,
      rgba(255,255,255,1)   0%,
      rgba(255,255,255,1)   35%,
      rgba(255,255,255,0.5) 40%,
      rgba(255,255,255,0)   45%
    );
  }
  .grad-overlay.right {
    right: 0;
    background: linear-gradient(to left,
      rgba(255,255,255,1)   0%,
      rgba(255,255,255,1)   35%,
      rgba(255,255,255,0.5) 40%,
      rgba(255,255,255,0)   45%
    );
  }



  .side-panel {
    display: flex; flex-direction: column; align-items: stretch;
    padding: 0 1rem 2rem; min-height: calc(100vh - 250px);
    position: relative; z-index: 1;
  }

  /* 전신 이미지 */
  .fullbody-wrap {
    width: 100%; aspect-ratio: 3/4; margin-bottom: 1rem;
    border-radius: 10px; overflow: visible; position: relative;
    background: #ffffff;
    cursor: crosshair;
    z-index: 0;
  }
  .fullbody-wrap.empty {
    border: none;
    background: #ffffff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .fullbody-wrap.empty:hover { background: #F5F5F5; }
  .fullbody-wrap input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 5;
  }
  .fullbody-wrap.has-image input[type="file"] { display: none; }

  .img-canvas {
    width: 100%; height: 100%; position: absolute; inset: 0; overflow: visible;
    border-radius: 10px;
  }
  .img-canvas img {
    position: absolute;
    transform-origin: 0 0;
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    will-change: transform;
  }
  .img-canvas img.grabbing { cursor: grabbing; }

  /* 크롭 오버레이 */
  .crop-overlay { position: fixed; z-index: 800; display: none; pointer-events: none; }
  .fullbody-wrap.crop-mode { cursor: default; }
  .fullbody-wrap.crop-mode .crop-overlay { display: block; }
  .crop-shade { position: absolute; background: rgba(0,0,0,0.42); pointer-events: none; }
  .crop-box {
    position: absolute; border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.3); cursor: move; pointer-events: all;
  }
  .crop-inner { position: absolute; inset: 0; }
  .crop-handle {
    position: absolute; width: 10px; height: 10px;
    background: #fff; border: 1.5px solid rgba(0,0,0,0.3); border-radius: 2px;
    transform: translate(-50%,-50%); z-index: 3; pointer-events: all;
  }
  .crop-handle[data-dir="nw"] { top:0%;   left:0%;   cursor: nw-resize; }
  .crop-handle[data-dir="ne"] { top:0%;   left:100%; cursor: ne-resize; }
  .crop-handle[data-dir="sw"] { top:100%; left:0%;   cursor: sw-resize; }
  .crop-handle[data-dir="se"] { top:100%; left:100%; cursor: se-resize; }
  .crop-handle[data-dir="n"]  { top:0%;   left:50%;  cursor: n-resize;  }
  .crop-handle[data-dir="s"]  { top:100%; left:50%;  cursor: s-resize;  }
  .crop-handle[data-dir="w"]  { top:50%;  left:0%;   cursor: w-resize;  }
  .crop-handle[data-dir="e"]  { top:50%;  left:100%; cursor: e-resize;  }

  /* 줌 컨트롤 */
  .img-controls {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 4px;
    background: rgba(0,0,0,0.45); border-radius: 20px; padding: 4px 8px;
    z-index: 10; opacity: 0; transition: opacity 0.2s;
  }
  .fullbody-wrap:hover .img-controls,
  .face-wrap:hover .img-controls { opacity: 1; }

  .ctrl-btn {
    background: none; border: none; color: #fff; cursor: pointer;
    font-size: 1rem; line-height: 1; padding: 2px 5px; border-radius: 4px;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.2); }

  .ctrl-reset {
    font-size: 0.68rem; color: rgba(255,255,255,0.8);
    background: none; border: none; cursor: pointer;
    padding: 2px 5px; border-radius: 4px; transition: background 0.15s;
  }
  .ctrl-reset:hover { background: rgba(255,255,255,0.2); color: #fff; }

  .ctrl-sep { width: 1px; height: 14px; background: rgba(255,255,255,0.3); margin: 0 2px; }

  .upload-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: var(--text-light); font-size: 0.78rem; text-align: center; pointer-events: none;
    padding: 1rem; position: relative; z-index: 1;
  }
  .upload-placeholder svg { width: 32px; height: 32px; }
  .side-panel.left .upload-placeholder svg { stroke: var(--A-color-accent); }
  .side-panel.right .upload-placeholder svg { stroke: var(--B-color-accent); }

  .reupload-btn {
    position: absolute; top: 8px; right: 8px; z-index: 10;
    background: rgba(0,0,0,0.45); border: none; border-radius: 6px;
    color: #fff; font-size: 0.7rem; padding: 4px 8px; cursor: pointer;
    opacity: 0; transition: opacity 0.2s;
  }
  .fullbody-wrap:hover .reupload-btn,
  .face-wrap:hover .reupload-btn { opacity: 1; }
  .crop-toggle-btn {
    position: absolute; top: 36px; right: 8px; z-index: 10;
    background: rgba(0,0,0,0.45); border: none; border-radius: 6px;
    color: #fff; font-size: 0.7rem; padding: 4px 8px; cursor: pointer;
    opacity: 0; transition: opacity 0.2s;
  }
  .fullbody-wrap:hover .crop-toggle-btn { opacity: 1; }

  /* 드래그앤드롭 하이라이트 */
  .drop-active { border: 2px solid #5BA4CF !important; background: rgba(91,164,207,0.08) !important; }

  /* near-white 보더 */
  .char-meta-label.near-white { border: 1.5px solid #D0D0D0; }

  /* A/B 버튼 클릭 커서 */
  .char-meta-label { cursor: pointer; transition: filter 0.15s; }
  .char-meta-label:hover { filter: brightness(1.2); }

  /* CENTER PANELS */
  .center-col { padding: 0 10px 2rem; width: 300px; overflow: hidden; position: relative; z-index: 3; }
  .col-a { margin-left: 0; }

  .char-meta-wrap {
    padding: 0 0 0.8rem;
    display: flex; align-items: flex-end; gap: 10px;
  }
  .char-meta-label {
    font-size: 1.2rem; font-weight: 700; color: #fff;
    width: 2rem; height: 2rem; border-radius: 6px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    margin-left: 2px;
  }
  .col-a .char-meta-label { background: var(--A-color); }
  .col-b .char-meta-label { background: var(--B-color); }
  .char-meta {
    font-size: 15px; color: var(--text-light); outline: none; cursor: text;
    border-bottom: 1px solid transparent; transition: border-color 0.2s; display: inline-block;
  }
  .col-b .char-meta-wrap { justify-content: flex-end; }
  .col-b .char-meta-label { margin-right: 2px; }
  .col-b .char-meta { text-align: right; }
  .col-a .char-meta:hover, .col-a .char-meta:focus { border-bottom-color: var(--A-color-accent); }
  .col-b .char-meta:hover, .col-b .char-meta:focus { border-bottom-color: var(--B-color-accent); }

  /* 얼굴 이미지: 실선 보더, 가로 300px 고정 */
  .face-wrap {
    width: 100%; aspect-ratio: 3/3.5;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #F5F5F5;
    overflow: hidden; position: relative;
    cursor: crosshair;
  }
  .face-wrap.empty {
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .col-a .face-wrap.empty:hover,
  .col-b .face-wrap.empty:hover { border-color: #9AA0B0; background: #F0F1F3; }
  .face-wrap input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 5;
  }
  .face-wrap.has-image input[type="file"] { display: none; }

  .face-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--text-light); font-size: 0.74rem; text-align: center; pointer-events: none;
    position: relative; z-index: 1;
  }
  .face-placeholder svg { width: 26px; height: 26px; }
  .col-a .face-placeholder svg { stroke: var(--A-color-accent); }
  .col-b .face-placeholder svg { stroke: var(--B-color-accent); }

  /* traits */
  .traits-heading { font-size: 18px; font-weight: 700; color: var(--text-mid); margin-top: 15px; margin-bottom: 10px; }
  .trait-list { display: flex; flex-direction: column; gap: 5px; }
  .trait-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 4px;
    border-bottom: 1px solid var(--border); border-radius: 4px; transition: background 0.15s;
  }
  .trait-item:last-child { border-bottom: none; }
  .trait-item:hover { background: rgba(0,0,0,0.02); }

  .trait-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .col-a .trait-dot { background: var(--A-color-accent); }
  .col-b .trait-dot { background: var(--B-color-accent); }

  .trait-text {
    font-size: 16px; font-weight: 500; color: var(--text-mid); outline: none;
    flex: 1; cursor: text; padding: 1px 4px; border-radius: 3px; min-width: 30px;
  }
  .col-a .trait-text:focus { background: var(--A-color-pale); }
  .col-b .trait-text:focus { background: var(--B-color-pale); }

  .trait-del {
    background: none; border: none; cursor: pointer; color: var(--text-light);
    font-size: 14px; padding: 0 2px; line-height: 1;
    opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .trait-item:hover .trait-del { opacity: 1; }
  .trait-del:hover { color: #e05050; }

  .add-trait-btn {
    margin-top: 6px; background: none; border: 1px dashed var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 0.75rem; color: var(--text-light);
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .col-a .add-trait-btn:hover { border-color: var(--A-color-accent); color: var(--A-color); }
  .col-b .add-trait-btn:hover { border-color: var(--B-color-accent); color: var(--B-color); }

  .edit-hint {
    text-align: center; font-size: 0.68rem; color: var(--text-light);
    margin-top: 1.2rem; letter-spacing: 0.02em;
  }

  [contenteditable]:empty:before { content: attr(data-placeholder); color: var(--text-light); pointer-events: none; }

  /* DOMContentLoaded: 전신 이미지 상단 맞추기 */
/* COLOR PICKER */
  .cp-overlay {
    display: none; position: fixed; inset: 0; z-index: 1000;
  }
  .cp-overlay.open { display: block; }
  .cp-panel {
    position: fixed; z-index: 1001;
    background: #fff; border: 1px solid #D8DADF;
    border-radius: 12px; padding: 14px;
    width: 240px;
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }
  .cp-palette {
    width: 100%; height: 150px; border-radius: 6px;
    position: relative; cursor: crosshair; flex-shrink: 0; display: block;
  }
  .cp-palette-cursor {
    position: absolute; width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.3);
    transform: translate(-50%,-50%); pointer-events: none;
  }
  .cp-slider-wrap { position: relative; height: 12px; border-radius: 6px; cursor: pointer; flex-shrink: 0; }
  .cp-slider-thumb {
    position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    transform: translate(-50%,-50%); pointer-events: none;
  }
  .cp-hex-row { display: flex; align-items: center; gap: 8px; }
  .cp-hex-label { font-size: 12px; color: #9AA0B0; min-width: 28px; }
  .cp-hex-input {
    flex: 1; min-width: 0; font-size: 13px; font-family: monospace;
    border: 1px solid #E8EAEF; border-radius: 8px;
    padding: 6px 8px; background: #F7F8FA; color: #1A1A2E; outline: none;
  }
  .cp-hex-input:focus { border-color: #9AA0B0; }
  .eyedropper-btn {
    width: 28px; height: 28px; border-radius: 5px;
    border: 1px solid #E8EAEF; background: #F7F8FA;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; padding: 0;
    transition: background 0.15s, border-color 0.15s;
  }
  .eyedropper-btn:hover:not(:disabled) { background: #ECEEF2; border-color: #C8CAD0; }
  .eyedropper-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .eyedropper-btn svg { width: 14px; height: 14px; stroke: #5A6070; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .tooltip-wrap { position: relative; display: inline-flex; }
  .cp-tooltip {
    position: absolute; bottom: calc(100% + 7px); left: 50%;
    transform: translateX(-50%);
    background: #2A2D35; color: #fff;
    font-size: 11.5px; line-height: 1.5;
    padding: 6px 10px; border-radius: 7px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.15s; z-index: 1100;
  }
  .cp-tooltip::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #2A2D35;
  }
  .tooltip-wrap:hover .cp-tooltip { opacity: 1; }
  .cp-apply-btn {
    width: 100%; padding: 7px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: filter 0.15s;
  }
  .cp-apply-btn:hover { filter: brightness(1.1); }

  /* A/B 버튼 클릭 가능하게 */
  .char-meta-label { cursor: pointer; transition: filter 0.15s; }
  .char-meta-label:hover { filter: brightness(1.2); }

  /* 캡처 영역 설정 모달 */
  .capture-modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 3000;
    background: rgba(0,0,0,0.25); align-items: center; justify-content: center;
  }
  .capture-modal-overlay.open { display: flex; }
  .capture-modal {
    background: #fff; border-radius: 14px; padding: 24px;
    width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); display: flex; flex-direction: column; gap: 16px;
  }
  .capture-modal-title {
    font-size: 16px; font-weight: 700; color: #1A1A2E;
  }
  .capture-modal-desc {

<script>
document.addEventListener('DOMContentLoaded', function() {
  const panelA = document.querySelector('.side-panel.left');
  const panelB = document.querySelector('.side-panel.right');
  const metaWrap = document.querySelector('.char-meta-wrap');
  if (metaWrap) {
    const metaH = metaWrap.getBoundingClientRect().height;
    if (panelA) panelA.style.paddingTop = metaH + 'px';
    if (panelB) panelB.style.paddingTop = metaH + 'px';
    const sharedPanel = document.querySelector('.side-panel.shared-fullbody');
    if (sharedPanel) sharedPanel.style.paddingTop = metaH + 'px';
  }

  // 드래그앤드롭
  ['fb-shared','fc-a','fc-b'].forEach(id => setupDropZone(id + '-wrap', id));

  // 배지 글자색 초기 적용 (배지 없으므로 char-meta-label만)
  ['A','B'].forEach(side => {
    const hex = getComputedStyle(document.documentElement).getPropertyValue(`--${side}-color`).trim();
    applyLabelStyle(side, hex);
  });



  // 전신 이미지 좌우 그라디언트 (화면 끝 → col 경계)
  function updateGradients() {
    const gL = document.getElementById('grad-left');
    const gR = document.getElementById('grad-right');
    if (!gL || !gR) return;
    const w = window.innerWidth;
    gL.style.width = (w * 0.90) + 'px';  // 왼쪽 끝에서 90%
    gR.style.width = (w * 0.90) + 'px';  // 오른쪽 끝에서 90%
  }
  // 전신 이미지 탭 위치: char-meta-wrap 상단에 맞추기
  const metaWrapH = metaWrap ? metaWrap.getBoundingClientRect().height : 0;
  const tabs = document.querySelector('.fullbody-tabs');
  if (tabs) {
    // char-meta-wrap의 상단은 paddingTop 안에 있으므로 top을 계산
    const metaTop = metaWrap ? metaWrap.getBoundingClientRect().top - document.querySelector('.shared-fullbody').getBoundingClientRect().top : 0;
    tabs.style.top = metaTop + 'px';
  }
  updateGradients();
  window.addEventListener('resize', updateGradients);

  // localStorage 불러오기
  lsLoad();

  setupAutoSave();
  addLsClearBtn();
});


const cp = {
  side: 'A', h: 0, s: 0, v: 0,
  dragging: null, // 'palette' | 'hue' | 'val'
};

function hsvToRgb(h, s, v) {
  const i = Math.floor(h/60)%6, f=h/60-Math.floor(h/60);
  const p=v*(1-s), q=v*(1-f*s), t=v*(1-(1-f)*s);
  const m=[[v,t,p],[q,v,p],[p,v,t],[p,q,v],[t,p,v],[v,p,q]][i];
  return m.map(x=>Math.round(x*255));
}
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function hexToHsv(hex) {
  hex=hex.replace('#','');
  if(hex.length!==6) return null;
  const r=parseInt(hex.slice(0,2),16)/255, g=parseInt(hex.slice(2,4),16)/255, b=parseInt(hex.slice(4,6),16)/255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b), d=max-min;
  let h=0, s=max===0?0:d/max, vv=max;
  if(d){ if(max===r) h=((g-b)/d+6)%6; else if(max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h*=60; }
  return {h,s,v:vv};
}
function getContrastColor(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (0.299*r+0.587*g+0.114*b)/255 > 0.55 ? '#000000' : '#ffffff';
}

/* 라벨 스타일 (near-white 보더 + 글자색) */
function isNearWhite(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.92;
}

function applyLabelStyle(side, hex) {
  const contrast  = getContrastColor(hex);
  const nearWhite = isNearWhite(hex);
  document.querySelectorAll(`.char-meta-label[onclick*="'${side}'"]`).forEach(el => {
    el.style.background = hex;
    el.style.color = contrast;
    el.classList.toggle('near-white', nearWhite);
  });
}

function cpGetHex() { return rgbToHex(...hsvToRgb(cp.h,cp.s,cp.v)); }

function deriveColorScale(hex) {
  const hsv = hexToHsv(hex);
  if (!hsv) return null;
  const { h, s, v } = hsv;
  if (s < 0.08) {
    return {
      accent: rgbToHex(...hsvToRgb(0, 0, Math.min(1, v*0.75+0.1))),
      light:  rgbToHex(...hsvToRgb(0, 0, Math.min(1, v*0.3+0.6))),
      pale:   rgbToHex(...hsvToRgb(0, 0, Math.min(1, v*0.1+0.88))),
    };
  }
  return {
    accent: rgbToHex(...hsvToRgb(h, Math.min(1, s*0.85+0.1), Math.min(1, v*1.1+0.15))),
    light:  rgbToHex(...hsvToRgb(h, Math.max(0, s*0.35),     Math.min(1, v*0.5+0.55))),
    pale:   rgbToHex(...hsvToRgb(h, Math.max(0, s*0.15),     Math.min(1, v*0.2+0.82))),
  };
}

function cpDrawPalette() {
  const canvas = document.getElementById('cp-palette');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const [hr,hg,hb] = hsvToRgb(cp.h,1,1);
  const gradH = ctx.createLinearGradient(0,0,W,0);
  gradH.addColorStop(0,'#fff'); gradH.addColorStop(1,`rgb(${hr},${hg},${hb})`);
  ctx.fillStyle=gradH; ctx.fillRect(0,0,W,H);
  const gradV = ctx.createLinearGradient(0,0,0,H);
  gradV.addColorStop(0,'rgba(0,0,0,0)'); gradV.addColorStop(1,'#000');
  ctx.fillStyle=gradV; ctx.fillRect(0,0,W,H);
}
function cpDrawHue() {
  const canvas = document.getElementById('cp-hue-canvas');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,canvas.width,0);
  for(let i=0;i<=360;i+=30) grad.addColorStop(i/360,`hsl(${i},100%,50%)`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,canvas.width,canvas.height);
}
function cpSyncUI() {
  const hex = cpGetHex();
  const contrast = getContrastColor(hex);
  const [hr,hg,hb] = hsvToRgb(cp.h,cp.s,1);

  // palette cursor
  const pal = document.getElementById('cp-palette');
  const cur = pal.querySelector('.cp-palette-cursor');
  cur.style.left = (cp.s * pal.offsetWidth) + 'px';
  cur.style.top  = ((1-cp.v) * pal.offsetHeight) + 'px';

  // hue thumb
  const hueTrack = document.getElementById('cp-hue-track');
  document.getElementById('cp-hue-thumb').style.left = (cp.h/360 * hueTrack.offsetWidth) + 'px';

  // val track + thumb
  const valTrack = document.getElementById('cp-val-track');
  valTrack.style.background = `linear-gradient(to right, #000, rgb(${hr},${hg},${hb}))`;
  document.getElementById('cp-val-thumb').style.left = (cp.v * valTrack.offsetWidth) + 'px';

  // hex + apply
  document.getElementById('cp-hex-input').value = hex;
  const applyBtn = document.getElementById('cp-apply-btn');
  applyBtn.style.background = hex;
  applyBtn.style.color = contrast;
}

function openPicker(side, el) {
  cp.side = side;
  const hex = getComputedStyle(document.documentElement).getPropertyValue(`--${side}-color`).trim();
  const hsv = hexToHsv(hex);
  if (hsv) { cp.h=hsv.h; cp.s=hsv.s; cp.v=hsv.v; }

  const panel = document.getElementById('cp-panel');
  const overlay = document.getElementById('cp-overlay');
  panel.style.display = 'flex';
  overlay.classList.add('open');

  // position near button
  const rect = el.getBoundingClientRect();
  const pW = 240, pH = 340;
  let left = rect.left;
  let top = rect.bottom + 8;
  if (left + pW > window.innerWidth - 12) left = window.innerWidth - pW - 12;
  if (top + pH > window.innerHeight - 12) top = rect.top - pH - 8;
  panel.style.left = left + 'px';
  panel.style.top  = top + 'px';

  // draw static hue bar + inject cursor
  cpDrawHue();
  if (!document.getElementById('cp-palette').querySelector('.cp-palette-cursor')) {
    const cur = document.createElement('div');
    cur.className = 'cp-palette-cursor';
    document.getElementById('cp-palette').appendChild(cur);
  }
  cpDrawPalette();
  cpSyncUI();
}

}

function cpApply() {
  const hex = cpGetHex();
  const side = cp.side;
  const contrast = getContrastColor(hex);
  const scale = deriveColorScale(hex);
  const root = document.documentElement;

  root.style.setProperty(`--${side}-color`, hex);
  if (scale) {
    root.style.setProperty(`--${side}-color-accent`, scale.accent);
    root.style.setProperty(`--${side}-color-light`,  scale.light);
    root.style.setProperty(`--${side}-color-pale`,   scale.pale);
  }

  // update all label buttons for this side
  document.querySelectorAll(`.char-meta-label[onclick*="'${side}'"]`).forEach(el => {
    el.style.background = hex;
    el.style.color = contrast;
  });

  applyLabelStyle(side, hex);
  lsSave();
  document.getElementById('cp-panel').style.display = 'none';
  document.getElementById('cp-overlay').classList.remove('open');
}

function cpOnHexType(val) {

// Drag handlers
document.addEventListener('DOMContentLoaded', function() {
  const pal = document.getElementById('cp-palette');
  const hueTrack = document.getElementById('cp-hue-track');
  const valTrack = document.getElementById('cp-val-track');

  function palPick(e) {
    const r = pal.getBoundingClientRect();
    cp.s = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    cp.v = 1-Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
    cpSyncUI();
  }
  function huePick(e) {
    const r = hueTrack.getBoundingClientRect();
    cp.h = Math.max(0,Math.min(360,((e.clientX-r.left)/r.width)*360));
    cpDrawPalette(); cpSyncUI();
  }
  function valPick(e) {
    const r = valTrack.getBoundingClientRect();
    cp.v = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    cpSyncUI();
  }

  pal.addEventListener('mousedown', e => { cp.dragging='palette'; palPick(e); e.preventDefault(); });
  hueTrack.addEventListener('mousedown', e => { cp.dragging='hue'; huePick(e); e.preventDefault(); });
  valTrack.addEventListener('mousedown', e => { cp.dragging='val'; valPick(e); e.preventDefault(); });

  document.addEventListener('mousemove', e => {
    if (cp.dragging==='palette') palPick(e);
    else if (cp.dragging==='hue') huePick(e);
    else if (cp.dragging==='val') valPick(e);
  });
  document.addEventListener('mouseup', () => { cp.dragging=null; });
});

function download(canvas, filename) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = filename;
  a.click();
}

function resizeCanvas(src, ratio) {
  const dst = document.createElement('canvas');
  dst.width  = Math.round(src.width  * ratio);
  dst.height = Math.round(src.height * ratio);
  dst.getContext('2d').drawImage(src, 0, 0, dst.width, dst.height);
  return dst;
}

function renderGradientText(el) {
  const style    = window.getComputedStyle(el);
  const text     = el.innerText.trim();
  const fontSize = parseFloat(style.fontSize);
  const fontWeight = style.fontWeight;
  const letterSpacing = parseFloat(style.letterSpacing) || 0;
  const colorA   = getComputedStyle(document.documentElement).getPropertyValue('--A-color').trim();
  const colorB   = getComputedStyle(document.documentElement).getPropertyValue('--B-color').trim();
  const DPR = 2; // 고해상도 렌더링

  // 크기 측정용 임시 캔버스
  const tmp = document.createElement('canvas');
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.font = `${fontWeight} ${fontSize * DPR}px Pretendard, sans-serif`;
  const measured = tmpCtx.measureText(text);
  const w = Math.ceil(measured.width + letterSpacing * DPR * (text.length - 1)) + 4;
  const h = Math.ceil(fontSize * DPR * 1.4);

  const c = document.createElement('canvas');
  c.width  = w;
  c.height = h;
  const ctx = c.getContext('2d');
  ctx.font = `${fontWeight} ${fontSize * DPR}px Pretendard, sans-serif`;

  const grad = ctx.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0, colorA);
  grad.addColorStop(1, colorB);
  ctx.fillStyle = grad;
  ctx.letterSpacing = (letterSpacing * DPR) + 'px';
  ctx.fillText(text, 2, fontSize * DPR);

  const img = document.createElement('img');
  img.src = c.toDataURL();
  // 실제 표시 크기는 원본과 동일하게 (DPR 나눔)
  img.style.cssText = `
    display: block;
    width: ${w / DPR}px;
    height: ${h / DPR}px;
    margin: 0 auto;
    letter-spacing: ${letterSpacing}px;
  `;
  return img;
}

/* JSON 저장/불러오기 */
function collectState() {
  const getImg = (imgId) => {
    const img = document.getElementById(imgId + '-img');
    return {
      src:   img ? img.src : null,
      state: imgState[imgId] ? { ...imgState[imgId] } : null,
    };
  };
  return {
    pairName: document.querySelector('.pair-name')?.innerText || '',
    auName:   document.querySelector('.au-name')?.innerText   || '',
    metaA:    document.querySelector('.col-a .char-meta')?.innerText || '',
    metaB:    document.querySelector('.col-b .char-meta')?.innerText || '',
    sourceA:  document.getElementById('source-a')?.innerText || '',
    sourceB:  document.getElementById('source-b')?.innerText || '',
    traitsA:  [...document.querySelectorAll('#traits-a .trait-text')].map(el => el.innerText),
    traitsB:  [...document.querySelectorAll('#traits-b .trait-text')].map(el => el.innerText),
    colorA:   getComputedStyle(document.documentElement).getPropertyValue('--A-color').trim(),
    colorB:   getComputedStyle(document.documentElement).getPropertyValue('--B-color').trim(),
    swatches: {
      hairA:  document.getElementById('swatch-hair-a')?.style.background || '#BFBFBF',
      eye1A:  document.getElementById('swatch-eye1-a')?.style.background || '#BFBFBF',
      eye2A:  document.getElementById('swatch-eye2-a')?.style.background || '#A0A0A0',
      hairB:  document.getElementById('swatch-hair-b')?.style.background || '#BFBFBF',
      eye1B:  document.getElementById('swatch-eye1-b')?.style.background || '#BFBFBF',
      eye2B:  document.getElementById('swatch-eye2-b')?.style.background || '#A0A0A0',
    },
    imgFcA:      getImg('fc-a'),
    imgFbShared: getImg('fb-shared'),
    imgFcB:      getImg('fc-b'),
  };
}

function applyState(state) {
  const set = (sel, val) => { const el = document.querySelector(sel); if (el) el.innerText = val; };
  const setId = (id, val) => { const el = document.getElementById(id); if (el) el.innerText = val; };
  set('.pair-name', state.pairName || '');
  set('.au-name',   state.auName   || '');
  set('.col-a .char-meta', state.metaA || '');
  set('.col-b .char-meta', state.metaB || '');
  setId('source-a', state.sourceA || '');
  setId('source-b', state.sourceB || '');
  // 특징
  const restoreTraits = (listId, values) => {
    const list = document.getElementById(listId);
    if (!list || !values) return;
    const items = list.querySelectorAll('.trait-text');
    items.forEach((el, i) => { if (values[i] !== undefined) el.innerText = values[i]; });
    // 저장된 항목이 기본 개수보다 많으면 추가 생성
    for (let i = items.length; i < values.length; i++) {
      const item = document.createElement('div');
      item.className = 'trait-item';
      item.innerHTML = `<div class="trait-dot"></div><span class="trait-text" contenteditable="true" spellcheck="false" data-placeholder="특징 설명"></span><button class="trait-del" onclick="delTrait(this)">✕</button>`;
      list.appendChild(item);
      item.querySelector('.trait-text').innerText = values[i];
    }
  };
  restoreTraits('traits-a', state.traitsA);
  restoreTraits('traits-b', state.traitsB);

  // 색상
  if (state.colorA) cpApplyHex('A', state.colorA);
  if (state.colorB) cpApplyHex('B', state.colorB);

  // 스와치 복원
  if (state.swatches) {
    const sw = state.swatches;
    if (sw.hairA) applySwatchHex('hair-a', normalizeColor(sw.hairA));
    if (sw.eye1A) applySwatchHex('eye1-a', normalizeColor(sw.eye1A));
    if (sw.eye2A) applySwatchHex('eye2-a', normalizeColor(sw.eye2A));
    if (sw.hairB) applySwatchHex('hair-b', normalizeColor(sw.hairB));
    if (sw.eye1B) applySwatchHex('eye1-b', normalizeColor(sw.eye1B));
    if (sw.eye2B) applySwatchHex('eye2-b', normalizeColor(sw.eye2B));
  }

  // 이미지 복원
  const restoreImg = (imgId, wrapId, data) => {
    if (!data || !data.src) return;
    const wrap   = document.getElementById(wrapId);
    const canvas = document.getElementById(imgId + '-canvas');
    const ph     = wrap ? wrap.querySelector('.upload-placeholder, .face-placeholder') : null;
    const old    = canvas ? canvas.querySelector('img') : null;
    if (old) old.remove();
    const img = document.createElement('img');
    img.id = imgId + '-img';
    img.src = data.src;
    img.draggable = false;
    if (canvas) canvas.appendChild(img);
    img.onload = () => {
      if (data.state) {
        imgState[imgId] = { ...data.state };
      } else {
        const wW = wrap.offsetWidth, wH = wrap.offsetHeight;
        const sc = Math.max(wW / img.naturalWidth, wH / img.naturalHeight);
        imgState[imgId] = { scale: sc, x: (wW - img.naturalWidth*sc)/2, y: (wH - img.naturalHeight*sc)/2, natW: img.naturalWidth, natH: img.naturalHeight, wrapW: wW, wrapH: wH };
      }
      applyTransform(imgId);
      if (wrap) { wrap.classList.remove('empty'); wrap.classList.add('has-image'); }
      if (ph) ph.style.display = 'none';
      setupDrag(img, imgId, wrap);
      setupWheelZoom(wrap, imgId);
    };
  };
  if (state.imgFcA)      restoreImg('fc-a',      'fc-a-wrap',      state.imgFcA);
  if (state.imgFbShared) restoreImg('fb-shared',  'fb-shared-wrap', state.imgFbShared);
  if (state.imgFcB)      restoreImg('fc-b',       'fc-b-wrap',      state.imgFcB);
}

function cpApplyHex(side, hex) {
  const contrast = getContrastColor(hex);
  const scale    = deriveColorScale(hex);
  const root     = document.documentElement;
  root.style.setProperty(`--${side}-color`, hex);
  if (scale) {
    root.style.setProperty(`--${side}-color-accent`, scale.accent);
    root.style.setProperty(`--${side}-color-light`,  scale.light);
    root.style.setProperty(`--${side}-color-pale`,   scale.pale);
  }
  applyLabelStyle(side, hex);
}

  const blob  = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a     = document.createElement('a');
  a.href      = URL.createObjectURL(blob);
  a.download  = '자료저장용-center-.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadJSON() {
  const fi = document.createElement('input');
  fi.type = 'file'; fi.accept = '.json'; fi.style.display = 'none';
  document.body.appendChild(fi);
  fi.onchange = async () => {
    try {
      const text  = await fi.files[0].text();
      const state = JSON.parse(text);
      applyState(state);
    } catch(e) {
      alert('JSON 파일을 불러오는 데 실패했어요.');
    }
    document.body.removeChild(fi);
  };
  fi.click();
}

/* 전신 이미지 탭 전환 */
function switchFullbodyTab(tab) {
  const wrap = document.getElementById('fb-shared-wrap');
  const t1   = document.getElementById('tab-1');
  const t2   = document.getElementById('tab-2');
  const gL   = document.getElementById('grad-left');
  const gR   = document.getElementById('grad-right');
  if (tab === 1) {
    wrap.classList.remove('mode-fixed');
    wrap.style.overflow = 'visible';
    t1.classList.add('active'); t2.classList.remove('active');
    if (gL) gL.style.display = '';
    if (gR) gR.style.display = '';
  } else {
    wrap.classList.add('mode-fixed');
    wrap.style.overflow = 'hidden';
    t1.classList.remove('active'); t2.classList.add('active');
    if (gL) gL.style.display = 'none';
    if (gR) gR.style.display = 'none';
  }
}
const cropState = {};

function toggleCrop(wrapId) {
  const wrap = document.getElementById(wrapId);
  const overlay = document.getElementById('crop-overlay-' + wrapId);
  const isActive = wrap.classList.contains('crop-mode');
  if (isActive) {
    // 완료: cropState 기준으로 clip-path 적용
    wrap.classList.remove('crop-mode');
    overlay.style.display = 'none';
    document.getElementById('crop-btns-' + wrapId).style.display = 'none';
    applyCrop(wrapId);
  } else {
    // 크롭 모드 진입: 기존 clip-path 제거
    wrap.style.clipPath = '';
    wrap.style.overflow = 'visible';
    overlay.style.display = 'block';
    positionOverlay(wrapId);
    if (!cropState[wrapId]) initCropBox(wrapId);
    else renderCrop(wrapId);
    wrap.classList.add('crop-mode');
  }
}

function applyCrop(wrapId) {
  const c = cropState[wrapId];
  if (!c) return;
  const wrap = document.getElementById(wrapId);
  // wrap 내 좌표 기준 inset clip-path 적용
  const pw = wrap.offsetWidth, ph = wrap.offsetHeight;
  const top    = Math.max(0, c.y);
  const left   = Math.max(0, c.x);
  const right  = Math.max(0, pw - (c.x + c.w));
  const bottom = Math.max(0, ph - (c.y + c.h));
  wrap.style.overflow = 'hidden';
  wrap.style.clipPath = `inset(${top}px ${right}px ${bottom}px ${left}px)`;
}

function positionOverlay(wrapId) {
  const wrap = document.getElementById(wrapId);
  const wrapRect = wrap.getBoundingClientRect();
  const b = getImgBounds(wrapId);
  const overlay = document.getElementById('crop-overlay-' + wrapId);
  const btns = document.getElementById('crop-btns-' + wrapId);
  const imgW = b.maxX - b.minX;
  const imgH = b.maxY - b.minY;
  const left = wrapRect.left + b.minX;
  const top  = wrapRect.top  + b.minY;
  overlay.style.left   = left + 'px';
  overlay.style.top    = top  + 'px';
  overlay.style.width  = imgW + 'px';
  overlay.style.height = imgH + 'px';
  // 버튼: 오버레이 하단 중앙
  btns.style.display = 'flex';
  btns.style.left = (left + imgW/2) + 'px';
  btns.style.top  = (top + imgH - 36) + 'px';
  btns.style.transform = 'translateX(-50%)';
}

function getImgBounds(wrapId) {
  // wrapId 예: 'fb-a-wrap' → imgId: 'fb-a'
  const imgId = wrapId.replace('-wrap', '');
  const s = imgState[imgId];
  if (!s) {
    const wrap = document.getElementById(wrapId);
    return { minX: 0, minY: 0, maxX: wrap.offsetWidth, maxY: wrap.offsetHeight };
  }
  const rendW = s.natW * s.scale;
  const rendH = s.natH * s.scale;
  return {
    minX: s.x,
    minY: s.y,
    maxX: s.x + rendW,
    maxY: s.y + rendH,
  };
}

function initCropBox(wrapId) {
  const b = getImgBounds(wrapId);
  cropState[wrapId] = { x: b.minX, y: b.minY, w: b.maxX - b.minX, h: b.maxY - b.minY };
  setupCropHandlers(wrapId);
  renderCrop(wrapId);
}

function resetCropBox(wrapId) {
  const b = getImgBounds(wrapId);
  cropState[wrapId] = { x: b.minX, y: b.minY, w: b.maxX - b.minX, h: b.maxY - b.minY };
  renderCrop(wrapId);
}

function renderCrop(wrapId) {
  const c = cropState[wrapId]; if (!c) return;
  const b = getImgBounds(wrapId);
  const imgW = b.maxX - b.minX;
  const imgH = b.maxY - b.minY;
  // 크롭 좌표를 오버레이 로컬 좌표로 변환 (오버레이가 이미지 좌상단 기준)
  const rx = c.x - b.minX;
  const ry = c.y - b.minY;
  const { w, h } = c;

  const box = document.getElementById('crop-box-' + wrapId);
  box.style.left = rx+'px'; box.style.top = ry+'px';
  box.style.width = w+'px'; box.style.height = h+'px';

  document.getElementById('cs-t-'+wrapId).style.cssText = `top:0;left:0;right:0;height:${ry}px;`;
  document.getElementById('cs-b-'+wrapId).style.cssText = `bottom:0;left:0;right:0;top:${ry+h}px;`;
  document.getElementById('cs-l-'+wrapId).style.cssText = `top:${ry}px;left:0;width:${rx}px;height:${h}px;`;
  document.getElementById('cs-r-'+wrapId).style.cssText = `top:${ry}px;right:0;left:${rx+w}px;height:${h}px;`;
}

function setupCropHandlers(wrapId) {
  const wrap  = document.getElementById(wrapId);
  const box   = document.getElementById('crop-box-' + wrapId);
  const inner = document.getElementById('crop-inner-' + wrapId);
  const MIN   = 30;
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  box.querySelectorAll('.crop-handle').forEach(handle => {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const dir = handle.dataset.dir;
      const sx = e.clientX, sy = e.clientY;
      const orig = { ...cropState[wrapId] };
      function onMove(e) {
        const dx = e.clientX-sx, dy = e.clientY-sy;
        let { x, y, w, h } = orig;
        const b = getImgBounds(wrapId);
        if (dir.includes('n')) { const ny = clamp(y+dy, b.minY, y+h-MIN); h -= ny-y; y = ny; }
        if (dir.includes('s')) { h = clamp(h+dy, MIN, b.maxY-y); }
        if (dir.includes('w')) { const nx = clamp(x+dx, b.minX, x+w-MIN); w -= nx-x; x = nx; }
        if (dir.includes('e')) { w = clamp(w+dx, MIN, b.maxX-x); }
        cropState[wrapId] = { x, y, w, h };
        renderCrop(wrapId);
      }
      function onUp() { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  inner.addEventListener('mousedown', e => {
    e.preventDefault();
    const sx = e.clientX, sy = e.clientY;
    const orig = { ...cropState[wrapId] };
    box.style.cursor = 'grabbing';
    function onMove(e) {
      const b = getImgBounds(wrapId);
      cropState[wrapId].x = clamp(orig.x + e.clientX - sx, b.minX, b.maxX - orig.w);
      cropState[wrapId].y = clamp(orig.y + e.clientY - sy, b.minY, b.maxY - orig.h);
      renderCrop(wrapId);
    }
    function onUp() {
      box.style.cursor = 'move';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* 드래그앤드롭 이미지 업로드 */
function setupDropZone(wrapId, imgId) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  wrap.addEventListener('dragover',  e => { e.preventDefault(); wrap.classList.add('drop-active'); });
  wrap.addEventListener('dragleave', e => { if (!wrap.contains(e.relatedTarget)) wrap.classList.remove('drop-active'); });
  wrap.addEventListener('drop', e => {
    e.preventDefault(); wrap.classList.remove('drop-active');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) initImage({ files: [file] }, wrapId, imgId);
  });
}


// imgState: key = imgId, value = { scale, x, y, natW, natH, wrapW, wrapH }
const imgState = {};

function initImage(input, wrapId, imgId) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const wrap = document.getElementById(wrapId);
    const canvas = document.getElementById(imgId + '-canvas');
    const ph = wrap.querySelector('.upload-placeholder, .face-placeholder');

    // Remove old img if any
    const old = canvas.querySelector('img');
    if (old) old.remove();

    const img = document.createElement('img');
    img.id = imgId + '-img';
    img.src = e.target.result;
    img.draggable = false;
    canvas.appendChild(img);

    img.onload = function() {
      const wrapW = wrap.offsetWidth;
      const wrapH = wrap.offsetHeight;
      const natW = img.naturalWidth;
      const natH = img.naturalHeight;

      // Fit to cover the container
      const scaleX = wrapW / natW;
      const scaleY = wrapH / natH;
      const scale = Math.max(scaleX, scaleY);

      const x = (wrapW - natW * scale) / 2;
      const y = (wrapH - natH * scale) / 2;

      imgState[imgId] = { scale, x, y, natW, natH, wrapW, wrapH };
      applyTransform(imgId);

      wrap.classList.remove('empty');
      wrap.classList.add('has-image');
      if (ph) ph.style.display = 'none';
      setupDrag(img, imgId, wrap);
      setupWheelZoom(wrap, imgId);
    };
  };
  reader.readAsDataURL(input.files[0]);
}

function applyTransform(imgId) {
  const img = document.getElementById(imgId + '-img');
  if (!img) return;
  const s = imgState[imgId];
  img.style.width = s.natW + 'px';
  img.style.height = s.natH + 'px';
  img.style.transform = `translate(${s.x}px, ${s.y}px) scale(${s.scale})`;
}

function zoomImg(imgId, delta) {
  const s = imgState[imgId];
  if (!s) return;
  zoomAround(imgId, delta, s.wrapW / 2, s.wrapH / 2);
}

function zoomAround(imgId, delta, cx, cy) {
  const s = imgState[imgId];
  if (!s) return;
  const newScale = Math.max(0.1, Math.min(10, s.scale + delta * s.scale));
  const ratio = newScale / s.scale;
  s.x = cx - ratio * (cx - s.x);
  s.y = cy - ratio * (cy - s.y);
  s.scale = newScale;
  applyTransform(imgId);
}

function resetImg(imgId) {
  const s = imgState[imgId];
  if (!s) return;
  const scaleX = s.wrapW / s.natW;
  const scaleY = s.wrapH / s.natH;
  s.scale = Math.max(scaleX, scaleY);
  s.x = (s.wrapW - s.natW * s.scale) / 2;
  s.y = (s.wrapH - s.natH * s.scale) / 2;
  applyTransform(imgId);
}

function setupDrag(img, imgId, wrap) {
  let dragging = false, startX, startY, origX, origY;

  wrap.addEventListener('mousedown', function(e) {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
    if (!imgState[imgId]) return;
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origX = imgState[imgId].x; origY = imgState[imgId].y;
    img.classList.add('grabbing');
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    const s = imgState[imgId];
    if (!s) return;
    s.x = origX + (e.clientX - startX);
    s.y = origY + (e.clientY - startY);
    applyTransform(imgId);
  });

  document.addEventListener('mouseup', function() {
    if (dragging) { dragging = false; img.classList.remove('grabbing'); }
  });

  // Touch drag
  wrap.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    if (!imgState[imgId]) return;
    const t = e.touches[0];
    dragging = true;
    startX = t.clientX; startY = t.clientY;
    origX = imgState[imgId].x; origY = imgState[imgId].y;
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', function(e) {
    if (!dragging || e.touches.length !== 1) return;
    const s = imgState[imgId];
    if (!s) return;
    const t = e.touches[0];
    s.x = origX + (t.clientX - startX);
    s.y = origY + (t.clientY - startY);
    applyTransform(imgId);
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', function() { dragging = false; });
}

function setupWheelZoom(wrap, imgId) {
  wrap.addEventListener('wheel', function(e) {
    if (!imgState[imgId]) return;
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? -0.08 : 0.08;
    zoomAround(imgId, delta, cx, cy);
  }, { passive: false });
}

function reupload(wrapId, imgId) {
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.style.display = 'none';
  document.body.appendChild(fileInput);
  fileInput.onchange = function() {
    initImage(fileInput, wrapId, imgId);
    document.body.removeChild(fileInput);
  };
  fileInput.click();
}

/* 스와치 컬러 피커 (HAIR / EYE) */
const swatchCp = { key: null };

function openSwatchPicker(key, el) {
  swatchCp.key = key;
  const swatch = document.getElementById('swatch-' + key);
  const bg = swatch ? swatch.style.background : '#BFBFBF';
  const tmp = document.createElement('div');
  tmp.style.color = bg;
  document.body.appendChild(tmp);
  const rgb = getComputedStyle(tmp).color;
  document.body.removeChild(tmp);
  const m = rgb.match(/\d+/g);
  const hsv = m ? hexToHsv(rgbToHex(+m[0],+m[1],+m[2])) : null;

  cp.side = '__swatch__';
  cp.h = hsv ? hsv.h : 0;
  cp.s = hsv ? hsv.s : 0;
  cp.v = hsv ? hsv.v : 0.75;

  const panel = document.getElementById('cp-panel');
  const overlay = document.getElementById('cp-overlay');
  panel.style.display = 'flex';
  overlay.classList.add('open');

  const rect = el.getBoundingClientRect();
  const pW = 240, pH = 340;
  let left = rect.left, top = rect.bottom + 8;
  if (left + pW > window.innerWidth - 12) left = window.innerWidth - pW - 12;
  if (top + pH > window.innerHeight - 12) top = rect.top - pH - 8;
  panel.style.left = left + 'px';
  panel.style.top  = top + 'px';

  cpDrawHue();
  if (!document.getElementById('cp-palette').querySelector('.cp-palette-cursor')) {
    const cur = document.createElement('div');
    cur.className = 'cp-palette-cursor';
    document.getElementById('cp-palette').appendChild(cur);
  }
  cpDrawPalette(); cpSyncUI();
}

function normalizeColor(color) {
  if (!color) return '#BFBFBF';
  if (color.startsWith('#')) return color;
  const tmp = document.createElement('div');
  tmp.style.color = color;
  document.body.appendChild(tmp);
  const rgb = getComputedStyle(tmp).color;
  document.body.removeChild(tmp);
  const m = rgb.match(/\d+/g);
  return m ? rgbToHex(+m[0], +m[1], +m[2]) : '#BFBFBF';
}

function applySwatchHex(key, hex) {
  const swatch = document.getElementById('swatch-' + key);
  if (!swatch) return;
  swatch.style.background = hex;
  const inp = swatch.querySelector('input'); if (inp) inp.value = hex;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  const lum = (0.299*r + 0.587*g + 0.114*b)/255;
  swatch.style.border = lum >= 0.88 ? '1px solid #ccc' : '1px solid transparent';
}

// cpApply가 __swatch__ 모드일 때 분기 처리
const _origCpApply = window.cpApply;
window.cpApply = function() {
  if (cp.side === '__swatch__') {
    const hex = cpGetHex();
    applySwatchHex(swatchCp.key, hex);
    lsSave();
    document.getElementById('cp-panel').style.display = 'none';
    document.getElementById('cp-overlay').classList.remove('open');
  } else {
    _origCpApply();
  }
};

function addTrait(listId) {
  const list = document.getElementById(listId);
  const item = document.createElement('div');
  item.className = 'trait-item';
  item.innerHTML = `<div class="trait-dot"></div><span class="trait-text" contenteditable="true" spellcheck="false"></span><button class="trait-del" onclick="delTrait(this)">✕</button>`;
  list.appendChild(item);
  item.querySelector('.trait-text').focus();
}

function delTrait(btn) { btn.closest('.trait-item').remove(); }
